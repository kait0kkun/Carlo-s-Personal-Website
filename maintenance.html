<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance — Carlo Bunayos</title>
  <meta name="description" content="This page is currently under maintenance.">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy-900: #0A1628;
      --navy-800: #111D35;
      --navy-700: #1B2A4A;
      --gold-500: #C9A84C;
      --gold-400: #D4B96E;
      --white: #FFFFFF;
      --off-white: #FAFBFD;
      --gray-600: #868E96;
      --gray-800: #343A40;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-accent: 'Outfit', sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.7;
      color: var(--gray-800);
      background-color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .maintenance-container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .maintenance-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      background: var(--navy-900);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .maintenance-icon svg {
      width: 36px;
      height: 36px;
      stroke: var(--gold-500);
    }

    .maintenance-label {
      font-family: var(--font-accent);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-500);
      margin-bottom: 1rem;
    }

    .maintenance-title {
      font-family: var(--font-heading);
      font-size: 3rem;
      font-weight: 500;
      color: var(--navy-900);
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .maintenance-description {
      font-size: 1.125rem;
      color: var(--gray-600);
      margin-bottom: 2rem;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .maintenance-timer {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--off-white);
      border-radius: 9999px;
      font-family: var(--font-accent);
      font-size: 0.875rem;
      color: var(--navy-800);
    }

    .maintenance-timer::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--gold-500);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    @media (max-width: 640px) {
      .maintenance-title {
        font-size: 2.25rem;
      }

      .maintenance-description {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="maintenance-container">
    <div class="maintenance-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M11.35 3.836c-.065.21-.143.417-.233.62a7.361 7.361 0 0 1-3.252 2.667 6.196 6.196 0 0 1-2.853.66 6.196 6.196 0 0 1-2.853-.66 7.361 7.361 0 0 1-3.252-2.667c-.09-.203-.168-.41-.233-.62A6.13 6.13 0 0 1 .65 6.18a6.217 6.217 0 0 1 0-2.363c.065-.21.143-.417.233-.62a7.361 7.361 0 0 1 3.252-2.667 6.196 6.196 0 0 1 2.853-.66c.926 0 1.793.337 2.467.897.25.21.46.45.62.71m2.587 5.483V19.5a2 2 0 0 1-2 2h-6.75a2 2 0 0 1-2-2v-6.75a2 2 0 0 1 2-2H12m4.5 5.833a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0" />
      </svg>
    </div>

    <p class="maintenance-label">Under Maintenance</p>
    <h1 class="maintenance-title">We'll be back soon</h1>
    <p class="maintenance-description">
      This website is currently under maintenance. It will be back online once updates are finalized and approved by the
      client. Thank you for your patience.
    </p>
    <div class="maintenance-timer">Estimated return: To be announced</div>
  </div>
</body>

</html>
