<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Depth Gallery | Carlo Bunayos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg-dark: #0a0a0a; --gold: #c9a84c; --white: #f4f4f4; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; background: var(--bg-dark); }
    
    .frame {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 1.5rem 2rem; display: flex;
      justify-content: space-between; align-items: center; z-index: 100;
      background: linear-gradient(to bottom, rgba(10,10,10,0.9) 0%, transparent 100%);
    }
    .frame__title { font-size: 0.85rem; font-weight: 400; color: var(--white); opacity: 0.6; letter-spacing: 0.05em; }
    .frame__title a { color: var(--gold); text-decoration: none; }
    .frame__albums { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .album-btn {
      font-size: 0.7rem; color: rgba(255,255,255,0.7); text-decoration: none;
      padding: 0.4rem 0.75rem; border: 1px solid rgba(255,255,255,0.5);
      border-radius: 20px; cursor: pointer; transition: all 0.3s;
      background: rgba(255,255,255,0.1);
    }
    .album-btn:hover, .album-btn.active { border-color: var(--gold); color: var(--gold); opacity: 1; }
    .frame__back { font-size: 0.8rem; color: var(--white); text-decoration: none; opacity: 0.5; }
    .frame__back:hover { opacity: 1; color: var(--gold); }
    
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; z-index: 0; pointer-events: none; }
    #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    #ui-layer .caption { position: absolute; width: 35%; padding: 2rem; opacity: 0; pointer-events: auto; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 500px; text-align: center; background: rgba(0,0,0,0.25); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
    #ui-layer .caption.left { left: 5%; right: auto; }
    #ui-layer .caption.active { opacity: 1; }
    #ui-layer .caption-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #ffffff; text-shadow: 0 2px 20px rgba(0,0,0,0.9); line-height: 1.4; margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; position: relative; cursor: pointer; } #ui-layer .tooltip { visibility: hidden; opacity: 0; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.95); color: #fff; padding: 1rem 1.25rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; max-width: 400px; width: max-content; text-align: left; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); z-index: 100; transition: all 0.3s ease; pointer-events: none; } #ui-layer .tooltip::after { content: " \; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 8px solid transparent; border-top-color: rgba(20,20,20,0.95); } #ui-layer .caption-title:hover .tooltip { visibility: visible; opacity: 1; bottom: calc(100% + 12px); }
    #ui-layer .caption-chip { width: 12px; height: 12px; border-radius: 50%; margin-bottom: 1rem; box-shadow: 0 2px 15px rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.3); }
    #ui-layer .caption-counter { position: fixed; top: 50%; transform: translateY(-50%); font-family: 'Playfair Display', serif; font-size: 4rem; color: #e0e0e0; text-shadow: 0 2px 20px rgba(0,0,0,0.9); }
    #ui-layer .caption-counter.left { left: 1.5rem; }
    #ui-layer .caption-counter.right { right: 1.5rem; }
    
    @media (max-width: 768px) {
      .frame { flex-direction: column; gap: 1rem; padding: 1rem; }
      #ui-layer .caption { display: none; }
      #ui-layer .caption-counter { font-size: 2.5rem; top: auto; bottom: 1rem; transform: none; }
      #ui-layer .caption-counter.left, #ui-layer .caption-counter.right { left: 50%; transform: translateX(-50%); }
    }
    
    .loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 1000;
      transition: opacity 0.5s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .loading span { color: var(--gold); font-size: 0.75rem; letter-spacing: 0.3em; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    
    #scroll-proxy { position: absolute; top: 0; left: 0; width: 100%; z-index: 1; }
  </style>
</head>
<body>
  <div class="loading" id="loading"><span>LOADING</span></div>
  
  <header class="frame">
    <h1 class="frame__title">Activities by <a href="../#home">Carlo Bunayos</a></h1>
    <nav class="frame__albums" id="albumButtons"></nav>
    <a class="frame__back" href="../#activities">← Back</a>
  </header>
  
  <div id="ui-layer"></div>
  <canvas id="canvas"></canvas>
  <div id="scroll-proxy"></div>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
      }
    }
  </script>
  
  <script type="module">
    import * as THREE from 'three';
    
    let albums = {};
    let albumManifest = {};
    let currentAlbum = 'DAMNHS';
    let camera, scene, renderer, planes = [];
    let targetProgress = 0, currentProgress = 0, prevProgress = 0, velocity = 0;
    let maxScroll = 1;
    let isMobile = window.innerWidth < 768;
    const planeGap = 12;
    const albumGap = 60;
    let allPlanesData = [];
    let cameraStartZ = 5;
    let cameraEndZ = 0;
    let currentZ = 0;
    
    const mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };
    const loading = document.getElementById('loading');
    const scrollProxy = document.getElementById('scroll-proxy');
    const uiLayer = document.getElementById('ui-layer');
    const canvas = document.getElementById('canvas');
    
    function getAlbumData(key) {
      const a = albums[key];
      if (!a || !a.files) return [];
      const data = [];
      for (const num of a.files) {
        data.push({
          textureSrc: `${a.path}${a.prefix}${num}.webp`,
          bg: '#1a1a1a',
          b1: a.color,
          b2: '#2a2a2a',
          label: { word: a.description || a.word, color: a.color }
        });
      }
      return data;
    }
    
    async function loadManifest() {
      try {
        const res = await fetch('../assets/images/manifest.json');
        albumManifest = await res.json();
        albums = {};
        const prefixes = {
          'DAMNHS': 'damnhs', 'Deped NIR': 'depednir', 'FilAm': 'filam', 'Germany': 'germany',
          'Lampara Company': 'lcc', 'Lampara Meetings': 'lm', 'Outreach of PNPA': 'opnpa',
          'Pasig Local Gove': 'plgu', 'Pasindungog': 'pasind', 'Region 2': 'reg2', 'San Enrique': 'se'
        };
        for (const [key, data] of Object.entries(albumManifest)) {
          const prefix = prefixes[key] || key.toLowerCase().replace(/\s+/g, '');
          const folderPath = data.path;
          albums[key] = {
            ...data,
            path: `../assets/images/${folderPath}`,
            prefix: prefix
          };
        }
        const urlParams = new URLSearchParams(window.location.search);
        let albumParam = urlParams.get('album');
        if (albumParam) {
          albumParam = decodeURIComponent(albumParam);
        }
        if (albumParam && albums[albumParam]) {
          currentAlbum = albumParam;
        } else if (!albums[currentAlbum]) {
          currentAlbum = Object.keys(albums)[0];
        }
      } catch (e) { console.error('Failed to load manifest:', e); }
    }

    async function init() {
      await loadManifest();
      
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.z = cameraStartZ;
      
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      
      initBackground();
      
      buildPlanesData(currentAlbum);
      createUIcaptions(currentAlbum);
      createAlbumButtons();
      
      window.addEventListener('resize', onResize);
      window.addEventListener('scroll', onScroll);
      window.addEventListener('mousemove', onMouseMove);
      
      animate();
    }
    
    let bgMesh, bgMat;
    
    function initBackground() {
      const bgGeo = new THREE.PlaneGeometry(100, 100);
      bgMat = new THREE.ShaderMaterial({
        uniforms: {
          uBgColor: { value: new THREE.Color('#1a1a1a') },
          uBlob1Color: { value: new THREE.Color('#c9a84c') },
          uBlob2Color: { value: new THREE.Color('#25201a') },
          uTime: { value: 0 },
          uVelocity: { value: 0 },
          uNoiseStrength: { value: 0.04 }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform vec3 uBgColor;
          uniform vec3 uBlob1Color;
          uniform vec3 uBlob2Color;
          uniform float uTime;
          uniform float uVelocity;
          uniform float uNoiseStrength;
          varying vec2 vUv;

          float random(vec2 st) { 
            return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); 
          }

          void main() {
            vec2 center = vUv - 0.5;
            float dist = length(center);
            float vignette = 1.0 - smoothstep(0.3, 0.9, dist);
            
            float t = uTime * 0.3;
            vec2 blob1Pos = vec2(0.3 + sin(t) * 0.25, 0.35 + cos(t * 0.7) * 0.2);
            vec2 blob2Pos = vec2(0.7 + cos(t * 0.8) * 0.2, 0.65 + sin(t * 0.6) * 0.25);
            vec2 blob3Pos = vec2(0.5 + sin(t * 0.5) * 0.3, 0.5 + cos(t * 0.4) * 0.3);
            
            float blob1 = smoothstep(0.5, 0.0, distance(vUv, blob1Pos));
            float blob2 = smoothstep(0.45, 0.0, distance(vUv, blob2Pos));
            float blob3 = smoothstep(0.4, 0.0, distance(vUv, blob3Pos));
            
            vec3 baseColor = uBgColor * 0.6;
            vec3 color = baseColor;
            
            vec3 c1 = mix(uBlob1Color, uBgColor, 0.3);
            vec3 c2 = mix(uBlob2Color, uBgColor, 0.4);
            vec3 c3 = mix(uBlob1Color, uBlob2Color, 0.5);
            
            color = mix(color, c1, blob1 * 0.7);
            color = mix(color, c2, blob2 * 0.6);
            color = mix(color, c3, blob3 * 0.5);
            
            color = mix(color, baseColor, (1.0 - vignette) * 0.5);
            
            float vel = abs(uVelocity) * 8.0;
            color += vec3(vel * 0.1, vel * 0.05, vel * 0.02);
            
            float grain = random(vUv + fract(uTime)) * 0.03;
            color += grain - 0.015;
            
            gl_FragColor = vec4(color, 1.0);
          }
        `,
        depthWrite: false,
        depthTest: false
      });
      
      bgMesh = new THREE.Mesh(bgGeo, bgMat);
      bgMesh.position.z = -20;
      camera.add(bgMesh);
      scene.add(camera);
    }
    
    const textureLoader = new THREE.TextureLoader();
    const manager = new THREE.LoadingManager();
    
    manager.onLoad = () => {
      loading.style.opacity = '0';
      setTimeout(() => loading.classList.add('hidden'), 1000);
    };
    
    function buildPlanesData(key) {
      const data = getAlbumData(key);
      const albumIdx = Object.keys(albums).indexOf(key);
      const captionSide = albumIdx % 2 === 0 ? 'right' : 'left';
      const mobile = window.innerWidth < 768;
      
      allPlanesData = [];
      currentZ = 0;
      
      data.forEach((item, i) => {
        const sideMultiplier = i % 2 === 0 ? -1 : 1;
        const baseX = mobile ? 0 : (sideMultiplier * 2.5 + (Math.random() - 0.5) * 1.5);
        const baseY = mobile ? 0 : ((Math.random() - 0.5) * 2.0);
        
        allPlanesData.push({
          ...item,
          baseX,
          baseY,
          z: currentZ,
          albumIdx,
          captionSide,
          planeIndex: i
        });
        
        currentZ -= planeGap;
      });
      
      cameraEndZ = currentZ - 5;
      scrollProxy.style.height = `${allPlanesData.length * 150}dvh`;
      maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      
      createPlanes();
    }
    
    function createPlanes() {
      planes.forEach(p => scene.remove(p));
      planes = [];
      let loadedCount = 0;
      const total = allPlanesData.length;
      
      allPlanesData.forEach((data, idx) => {
        textureLoader.load(data.textureSrc, tex => {
          tex.colorSpace = THREE.SRGBColorSpace;
          
          const img = tex.image;
          const aspect = (img && img.width > 0 && img.height > 0) ? img.width / img.height : 1.33;
          const isPortrait = aspect < 1.2;
          const w = isPortrait ? 1.8 : 2.5;
          const h = isPortrait ? 2.4 : 1.8;
          
          const geo = new THREE.PlaneGeometry(w, h);
          const mat = new THREE.MeshBasicMaterial({
            map: tex,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0
          });
          
          const mesh = new THREE.Mesh(geo, mat);
          mesh.baseX = data.baseX;
          mesh.baseY = data.baseY;
          mesh.baseZ = data.z;
          mesh.planeIndex = idx;
          
          mesh.position.set(mesh.baseX, mesh.baseY, mesh.baseZ);
          mesh.userData = data;
          
          scene.add(mesh);
          planes.push(mesh);
          
          loadedCount++;
          if (loadedCount === total) {
            loading.style.opacity = '0';
            loading.classList.add('hidden');
            isInitialized = true;
            window.scrollTo(0, 0);
            targetProgress = 0;
            currentProgress = 0;
            prevProgress = 0;
          }
        }, undefined, () => {
          loadedCount++;
          if (loadedCount === total) {
            loading.style.opacity = '0';
            loading.classList.add('hidden');
            isInitialized = true;
            window.scrollTo(0, 0);
            targetProgress = 0;
            currentProgress = 0;
            prevProgress = 0;
          }
        });
      });
    }
    
    function createUIcaptions(key) {
      uiLayer.innerHTML = '';
      const isMobile = window.innerWidth < 768;
      
      const counter = document.createElement('div');
      counter.className = 'caption-counter left';
      counter.id = 'imgCounter';
      counter.textContent = '01';
      uiLayer.appendChild(counter);
      
      if (isMobile) return;
      
      const data = getAlbumData(key);
      
      data.forEach((item, i) => {
        const caption = document.createElement('div');
        caption.className = `caption right` + (i === 0 ? ' active' : '');
        caption.id = `caption-${i}`;
        const titleText = item.label?.word || 'Memory';
        caption.innerHTML = `
          <div class="caption-chip" style="background: ${item.label?.color || '#c9a84c'}"></div>
          <div class="caption-title">${titleText}<div class="tooltip">${titleText}</div></div>
        `;
        uiLayer.appendChild(caption);
      });
    }
    
    function createAlbumButtons() {
      const container = document.getElementById('albumButtons');
      container.innerHTML = '';
      
      Object.entries(albums).forEach(([key, data]) => {
        const btn = document.createElement('button');
        btn.className = 'album-btn' + (key === currentAlbum ? ' active' : '');
        btn.textContent = data.name;
        btn.onclick = () => { 
          currentAlbum = key; 
          window.scrollTo(0, 0);
          targetProgress = 0;
          currentProgress = 0;
          prevProgress = 0;
          buildPlanesData(key); 
          createUIcaptions(key);
          createAlbumButtons(); 
        };
        container.appendChild(btn);
      });
    }
    
    function onResize() {
      maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      isMobile = window.innerWidth < 768;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      scrollProxy.style.height = `${allPlanesData.length * 150}dvh`;
      maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    }
    
    function onScroll() {
      targetProgress = window.scrollY / Math.max(1, maxScroll);
    }
    
    function onMouseMove(e) {
      mouse.targetX = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.targetY = -(e.clientY / window.innerHeight) * 2 + 1;
    }
    
    const clock = new THREE.Clock();
    const tempColor1 = new THREE.Color();
    const tempColor2 = new THREE.Color();
    let isInitialized = false;
    
    function animate() {
      requestAnimationFrame(animate);
      
      if (!isInitialized && planes.length > 0) {
        isInitialized = true;
      }
      
      if (!isInitialized) {
        renderer.render(scene, camera);
        return;
      }
      
      const time = clock.getElapsedTime();
      
      currentProgress = THREE.MathUtils.lerp(currentProgress, targetProgress, 0.05);
      velocity = THREE.MathUtils.lerp(velocity, currentProgress - prevProgress, 0.1);
      velocity = THREE.MathUtils.clamp(velocity, -0.05, 0.05);
      prevProgress = currentProgress;
      if (Math.abs(velocity) < 0.0001) velocity = 0;
      
      camera.position.z = THREE.MathUtils.lerp(cameraStartZ, cameraEndZ, currentProgress);
      mouse.x = THREE.MathUtils.lerp(mouse.x, mouse.targetX, 0.05);
      mouse.y = THREE.MathUtils.lerp(mouse.y, mouse.targetY, 0.05);
      
      planes.forEach((plane) => {
        let targetX = plane.baseX + (mouse.x * 0.2);
        let targetY = plane.baseY + (mouse.y * 0.2) + (velocity * 40.0);
        
        plane.position.x = THREE.MathUtils.lerp(plane.position.x, targetX, 0.1);
        plane.position.y = THREE.MathUtils.lerp(plane.position.y, targetY, 0.1);
        plane.rotation.x = THREE.MathUtils.lerp(plane.rotation.x, (velocity * 12.0) + (mouse.y * 0.05), 0.1);
        plane.rotation.y = THREE.MathUtils.lerp(plane.rotation.y, mouse.x * 0.05, 0.1);
        
        let dist = camera.position.z - plane.position.z;
        let targetOpacity = 1.0;
        
        if (dist < 2) targetOpacity = Math.max(0, dist / 2);
        if (dist > 50) {
          targetOpacity = 0;
        } else if (dist > 35) {
          targetOpacity = 1.0 - ((dist - 35) / 15);
        }
        plane.material.opacity = targetOpacity;
      });
      
      let currentPlaneIdx = 0;
      for (let i = 0; i < planes.length - 1; i++) {
        if (camera.position.z <= planes[i].baseZ && camera.position.z > planes[i + 1].baseZ) {
          currentPlaneIdx = i;
          break;
        }
      }
      
      if (camera.position.z > planes[0]?.baseZ) currentPlaneIdx = 0;
      if (camera.position.z <= planes[planes.length - 1]?.baseZ) currentPlaneIdx = planes.length - 1;
      
      let p0 = planes[currentPlaneIdx]?.userData;
      let p1 = planes[Math.min(currentPlaneIdx + 1, planes.length - 1)]?.userData;
      
      let blend = 0;
      if (p0 && p1 && p0.bg !== p1.bg) {
        const z0 = planes[currentPlaneIdx].baseZ;
        const z1 = planes[Math.min(currentPlaneIdx + 1, planes.length - 1)].baseZ;
        blend = (z0 - camera.position.z) / (z0 - z1);
        blend = THREE.MathUtils.clamp(blend, 0, 1);
      }
      
      if (p0) {
        bgMat.uniforms.uBgColor.value.copy(tempColor1.set(p0.bg || '#1a1a1a')).lerp(tempColor2.set(p1?.bg || '#1a1a1a'), blend);
        bgMat.uniforms.uBlob1Color.value.copy(tempColor1.set(p0.b1 || '#c9a84c')).lerp(tempColor2.set(p1?.b1 || '#c9a84c'), blend);
        bgMat.uniforms.uBlob2Color.value.copy(tempColor1.set(p0.b2 || '#25201a')).lerp(tempColor2.set(p1?.b2 || '#25201a'), blend);
      }
      
      bgMat.uniforms.uTime.value = time;
      bgMat.uniforms.uVelocity.value = velocity;
      
      const counter = document.getElementById('imgCounter');
      if (counter) {
        counter.textContent = String(currentPlaneIdx + 1).padStart(2, '0');
      }
      
      document.querySelectorAll('#ui-layer .caption').forEach((cap, i) => {
        cap.classList.toggle('active', i === currentPlaneIdx);
      });
      
      renderer.render(scene, camera);
    }
    
    init();
  </script>
</body>
</html>
