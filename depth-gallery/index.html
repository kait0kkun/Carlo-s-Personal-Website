<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Depth Gallery | Carlo Bunayos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg-dark: #0a0a0a; --gold: #c9a84c; --white: #f4f4f4; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-dark); }
    
    .frame {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 1.5rem 2rem; display: flex;
      justify-content: space-between; align-items: center; z-index: 100;
      background: linear-gradient(to bottom, rgba(10,10,10,0.9) 0%, transparent 100%);
    }
    .frame__title { font-size: 0.85rem; font-weight: 400; color: var(--white); opacity: 0.6; letter-spacing: 0.05em; }
    .frame__title a { color: var(--gold); text-decoration: none; }
    .frame__albums { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .album-btn {
      font-size: 0.7rem; color: rgba(255,255,255,0.7); text-decoration: none;
      padding: 0.4rem 0.75rem; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px; cursor: pointer; transition: all 0.3s;
    }
    .album-btn:hover, .album-btn.active { border-color: var(--gold); color: var(--gold); opacity: 1; }
    .frame__back { font-size: 0.8rem; color: var(--white); text-decoration: none; opacity: 0.5; }
    .frame__back:hover { opacity: 1; color: var(--gold); }
    
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    
    .loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 1000;
      transition: opacity 0.5s;
    }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .loading span { color: var(--gold); font-size: 0.75rem; letter-spacing: 0.3em; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    
    .label-overlay { position: fixed; top: 30%; z-index: 50; pointer-events: none; }
    .label-left { left: clamp(1.5rem, 5vw, 5rem); }
    .label-right { right: clamp(1.5rem, 5vw, 5rem); text-align: right; max-width: 70vw; }
    .label-index { font-family: 'Playfair Display', serif; font-size: 4.5rem; color: var(--gold); line-height: 1; }
    .label-chip { width: 18px; height: 18px; border-radius: 50%; margin-top: 1rem; }
    .label-card { background: rgba(10,10,10,0.9); backdrop-filter: blur(12px); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); max-height: 40vh; overflow-y: auto; }
    .label-word { font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 400; color: var(--white); line-height: 1.6; }
    .label-pms { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-top: 0.75rem; }
    
    @media (max-width: 768px) {
      .frame { flex-direction: column; gap: 1rem; padding: 1rem; }
      .label-overlay { display: none; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading"><span>LOADING</span></div>
  
  <header class="frame">
    <h1 class="frame__title">Activities by <a href="../#home">Carlo Bunayos</a></h1>
    <nav class="frame__albums" id="albumButtons"></nav>
    <a class="frame__back" href="../#activities">← Back</a>
  </header>
  
  <div class="label-overlay label-left">
    <div class="label-index" id="labelIndex">01</div>
    <div class="label-chip" id="labelChip"></div>
  </div>
  
  <div class="label-overlay label-right">
    <div class="label-card">
      <div class="label-word" id="labelWord">Memory</div>
      <div class="label-pms" id="labelPms">FilAm 2024</div>
    </div>
  </div>
  
  <canvas id="canvas"></canvas>
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.183.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.183.0/examples/jsm/"
    }
  }
  </script>
  
  <script type="module">
    import * as THREE from 'three';
    
    let albums = {};
    let albumManifest = {};
    let currentAlbum = 'DAMNHS';
    let camera, scene, renderer, planes = [];
    let scrollTarget = 0, scrollCurrent = 0;
    let velocity = 0, pointer = new THREE.Vector2(0, 0);
    let textures = new Map();
    const planeGap = 4;
    
    const labelIndex = document.getElementById('labelIndex');
    const labelWord = document.getElementById('labelWord');
    const labelPms = document.getElementById('labelPms');
    const labelChip = document.getElementById('labelChip');
    const loading = document.getElementById('loading');
    
    const canvas = document.getElementById('canvas');
    
    function getAlbumData(key) {
      const a = albums[key];
      if (!a || !a.files) return [];
      const data = [];
      for (const num of a.files) {
        data.push({
          textureSrc: `${a.path}${a.prefix}${num}.webp`,
          fallbackColor: a.color,
          accentColor: a.color,
          backgroundColor: '#1a1a1a',
          blob1Color: a.color,
          blob2Color: '#2a2a2a',
          position: { x: 0, y: 0 },
          label: { word: a.description || a.word, pms: a.year, color: a.color }
        });
      }
      return data;
    }
    
    async function loadManifest() {
      try {
        const res = await fetch('../assets/images/manifest.json');
        albumManifest = await res.json();
        albums = {};
        const prefixes = {
          'DAMNHS': 'damnhs', 'Deped NIR': 'depednir', 'FilAm': 'filam', 'Germany': 'germany',
          'Lampara Company': 'lcc', 'Lampara Meetings': 'lm', 'Outreach of PNPA': 'opnpa',
          'Pasig Local Gove': 'plgu', 'Pasindungog': 'pasind', 'Region 2': 'reg2', 'San Enrique': 'se'
        };
        for (const [key, data] of Object.entries(albumManifest)) {
          const prefix = prefixes[key] || key.toLowerCase().replace(/\s+/g, '');
          const folderPath = data.path;
          albums[key] = {
            ...data,
            path: `../assets/images/${folderPath}`,
            prefix: prefix
          };
        }
        const urlParams = new URLSearchParams(window.location.search);
        let albumParam = urlParams.get('album');
        if (albumParam) {
          albumParam = decodeURIComponent(albumParam);
        }
        if (albumParam && albums[albumParam]) {
          currentAlbum = albumParam;
        } else if (!albums[currentAlbum]) {
          currentAlbum = Object.keys(albums)[0];
        }
      } catch (e) { console.error('Failed to load manifest:', e); }
    }

    async function init() {
      await loadManifest();
      
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.z = 6;
      
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x0a0a0a, 1);
      scene.background = new THREE.Color(0x0a0a0a);
      
      initBackground();
      loadAlbum(currentAlbum);
      createAlbumButtons();
      
      window.addEventListener('resize', onResize);
      window.addEventListener('wheel', onWheel, { passive: false });
      window.addEventListener('pointermove', onPointer);
      window.addEventListener('touchstart', onTouchStart, { passive: true });
      window.addEventListener('touchmove', onTouchMove, { passive: false });
      
      animate();
    }
    
    function initBackground() {
      const bgGeo = new THREE.PlaneGeometry(50, 50);
      const bgMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uVelocity: { value: 0 },
          uBgColor: { value: new THREE.Color(0x1a1a1a) },
          uBlob1: { value: new THREE.Color(0xc9a84c) },
          uBlob2: { value: new THREE.Color(0x25201a) },
          uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
        `,
        fragmentShader: `
          precision highp float;
          uniform float uTime;
          uniform float uVelocity;
          uniform vec3 uBgColor;
          uniform vec3 uBlob1;
          uniform vec3 uBlob2;
          varying vec2 vUv;
          
          float rand(vec2 st) { return fract(sin(dot(st,vec2(12.9898,78.233)))*43758.5453); }
          
          void main() {
            vec2 uv = vUv;
            vec2 c1 = vec2(0.3+sin(uTime*0.2)*0.1, 0.5+cos(uTime*0.15)*0.08);
            vec2 c2 = vec2(0.7+sin(uTime*0.18)*0.08, 0.55+cos(uTime*0.22)*0.1);
            
            float d1 = smoothstep(0.5, 0.0, length(uv-c1));
            float d2 = smoothstep(0.45, 0.0, length(uv-c2));
            
            vec3 col = uBgColor;
            col = mix(col, uBlob1, d1*0.45);
            col = mix(col, uBlob2, d2*0.35);
            col += (rand(uv+uTime*0.01)-0.5)*0.02;
            col += uVelocity * 0.12;
            
            gl_FragColor = vec4(col, 1.0);
          }
        `,
        depthWrite: false
      });
      const bg = new THREE.Mesh(bgGeo, bgMat);
      bg.position.z = -10;
      scene.add(bg);
    }
    
    const textureLoader = new THREE.TextureLoader();
    
    async function loadAlbum(key) {
      // Update label immediately when switching albums
      const album = albums[key];
      if (album) {
        labelWord.textContent = album.description || album.word;
        labelPms.textContent = album.year || '';
        labelChip.style.background = album.color || '#c9a84c';
        labelIndex.textContent = '01';
      }
      
      // Reset scroll to start from beginning
      scrollTarget = 0;
      scrollCurrent = 0;
      
      planes.forEach(p => scene.remove(p));
      planes = [];
      textures.clear();
      
      const data = getAlbumData(key);
      
      for (let i = 0; i < data.length; i++) {
        const item = data[i];
        try {
          const tex = await new Promise(r => textureLoader.load(item.textureSrc, r, undefined, (err) => console.warn('Load error:', err)));
          tex.colorSpace = THREE.SRGBColorSpace;
          textures.set(i, tex);
          
          // Use image dimensions after texture loads
          const img = tex.image;
          const aspect = (img && img.width > 0 && img.height > 0) ? img.width / img.height : 1.33;
          
          // Smaller plane width for centered images
          const planeWidth = 1.6;
          const planeHeight = planeWidth / aspect;
          
          const geo = new THREE.PlaneGeometry(planeWidth, planeHeight);
          const mat = new THREE.MeshBasicMaterial({ 
            map: tex, 
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0
          });
          
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(item.position.x, item.position.y, -i * planeGap);
          mesh.userData = { ...item, index: i, aspect: aspect };
          
          scene.add(mesh);
          planes.push(mesh);
        } catch(e) { console.warn('Failed to load:', item.textureSrc, e); }
      }
      
      loading.classList.add('hidden');
    }
    
    function createAlbumButtons() {
      const container = document.getElementById('albumButtons');
      container.innerHTML = '';
      
      Object.entries(albums).forEach(([key, data]) => {
        const btn = document.createElement('button');
        btn.className = 'album-btn' + (key === currentAlbum ? ' active' : '');
        btn.textContent = data.name;
        btn.onclick = () => { currentAlbum = key; loadAlbum(key); createAlbumButtons(); };
        container.appendChild(btn);
      });
    }
    
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
function onWheel(e) {
      e.preventDefault();
      // Pull/scroll down = next image (like pulling curtain down)
      // Scroll up = previous image
      scrollTarget += e.deltaY * 0.015;
      const maxScroll = (planes.length - 1) * planeGap;
      scrollTarget = Math.max(0, Math.min(scrollTarget, maxScroll));
    }
    
    function onPointer(e) {
      pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
    }
    
    let touchStart = 0;
    function onTouchStart(e) { touchStart = e.touches[0].clientY; }
    function onTouchMove(e) {
      e.preventDefault();
      // REVERSE: Swipe down = previous, Swipe up = next
      const delta = touchStart - e.touches[0].clientY;
      scrollTarget -= delta * 0.03;
      touchStart = e.touches[0].clientY;
}
    
    const clock = new THREE.Clock();
    
    function animate() {
      requestAnimationFrame(animate);
      
      const time = clock.getElapsedTime();
      const delta = scrollTarget - scrollCurrent;
      // Smooth follow - like pulling
      scrollCurrent += (scrollTarget - scrollCurrent) * 0.12;
      velocity = Math.abs(delta) * 0.3;
      
      // Camera moves forward with scroll
      camera.position.z = 6 - scrollCurrent;
      
      const bg = scene.children.find(c => c.material?.uniforms?.uTime);
      if (bg?.material?.uniforms) {
        bg.material.uniforms.uTime.value = time;
        bg.material.uniforms.uVelocity.value = velocity;
        bg.material.uniforms.uBlob1.value.set(albums[currentAlbum].color);
      }
      
      planes.forEach((plane, i) => {
        // Original: fixed Z positions, camera moves
        const targetZ = -i * planeGap;
        
        // Fixed scale - smaller
        plane.scale.setScalar(1.8);
        
        plane.position.z = targetZ;
        
        // Parallax from pointer (subtle)
        const baseX = plane.userData.position.x;
        plane.position.x = THREE.MathUtils.lerp(plane.position.x, baseX + pointer.x * 0.1, 0.1);
        plane.position.y = THREE.MathUtils.lerp(plane.position.y, pointer.y * 0.05, 0.1);
        
        // Slight rotation from pointer
        plane.rotation.y = pointer.x * 0.02;
        plane.rotation.x = -pointer.y * 0.02;
        
        // Fade during scroll movement
        const currZ = plane.position.z;
        const transDist = Math.abs(targetZ - currZ);
        const scrolVel = Math.abs(scrollTarget - scrollCurrent);
        
        let tgtOpacity = 1;
        if (scrolVel > 0.5) {
          tgtOpacity = Math.max(0.5, 1 - (transDist / planeGap) * 0.4);
        }
        plane.material.opacity += (tgtOpacity - plane.material.opacity) * 0.08;
      });
      
      // Active image index based on scroll position
      const activeIndex = Math.floor(scrollCurrent / planeGap);
      const safeIndex = Math.max(0, Math.min(activeIndex, planes.length - 1));
      
      const data = planes[safeIndex]?.userData;
      if (data) {
        labelIndex.textContent = String(safeIndex + 1).padStart(2, '0');
        labelWord.textContent = data.label?.word || 'Memory';
        labelPms.textContent = data.label?.pms || '';
        labelChip.style.background = data.label?.color || '#c9a84c';
      }
      
      renderer.render(scene, camera);
    }
    
    init();
  </script>
</body>
</html>
